    <script type="module">



        var bl = window.location.hash.slice(1).split('?');
        var postid = null;

        if(bl.length >= 1) {
            for(var i = 0; i < bl.length; i += 1){
                switch (bl[i].split('=')[0]) {
                    case 'postid':
                        postid = bl[i].split('=')[1];
                        break;
                    default:
                        null;
                        break;
                }
            }
        }

        if (postid != null) {


            // TODO: Add SDKs for Firebase products that you want to use
            // https://firebase.google.com/docs/web/setup#available-libraries
        
            // Your web app's Firebase configuration
            // For Firebase JS SDK v7.20.0 and later, measurementId is optional
            const config = {
                apiKey: "AIzaSyCihK4VumiqDMH8xwubBVU9TqddYBrxj5I",
                authDomain: "apcodjellal.firebaseapp.com",
                databaseURL: "https://apcodjellal-default-rtdb.firebaseio.com",
                projectId: "apcodjellal",
                storageBucket: "apcodjellal.appspot.com",
                messagingSenderId: "969237585052",
                appId: "1:969237585052:web:de3531be7adcc57d496159",
                measurementId: "G-J7JTH7H0H4"
            };
        
            // Initialize Firebase
            firebase.initializeApp(config);
            var database = firebase.database();
            const rootRef = database.ref('posts');

            rootRef.orderByChild(postid).limitToLast(1).once('value')
            .then((querySnapshot) => {

                if (!querySnapshot.numChildren()) { // handle rare no-results case
                throw new Error('expected at least one result');
                }
                let dataSnapshot; 
                querySnapshot.forEach((snap) => dataSnapshot = snap); // get the snapshot we want out of the query's results list

                if (!dataSnapshot.exists()) { // value may be null, meaning idToFind doesn't exist
                throw new Error(`Entry ${postid} not found.`);
                }

                var posts_byid = dataSnapshot.val();
                $.each(posts_byid, function(i, item) {
                    var post = posts_byid[i];
                    if (post != null) {
                        $('.subject-post').html(post.subject);
                        $('#content-post').html(post.content);
                        $('#date-post').html(post.date);
                    }
                    // console.log('id:',i);
                });

                

            })
            .catch((error) => {
                console.log("Unexpected error:", error);
            });

        }


    </script>
